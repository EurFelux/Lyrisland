[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-merge-conflict" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "swiftformat", name = "SwiftFormat", entry = "swiftformat", language = "system", types = ["swift"] },
  { id = "swiftlint-fix", name = "SwiftLint Fix", entry = "swiftlint --fix", language = "system", types = ["swift"] },
  { id = "swiftlint", name = "SwiftLint", entry = "swiftlint", language = "system", types = ["swift"] },
]
